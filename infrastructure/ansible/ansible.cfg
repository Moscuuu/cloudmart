# Ansible configuration for CloudMart bastion host management
# Use gcloud compute ssh for OS Login authentication
# Update remote_user with your GCP username (OS Login format: username_domain_com)

[defaults]
inventory = inventory/dev.yml
remote_user = YOUR_USERNAME
host_key_checking = False
retry_files_enabled = False
stdout_callback = yaml

[privilege_escalation]
become = True
become_method = sudo

[ssh_connection]
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no
pipelining = True

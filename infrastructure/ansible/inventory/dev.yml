---
# CloudMart Dev Environment Inventory
#
# Connection methods:
# 1. Direct SSH (if external IP accessible): set ansible_host to bastion external IP
# 2. IAP tunnel (recommended): use ProxyCommand with gcloud (see ansible_ssh_common_args)
#
# After running `tofu output` in the dev environment, update:
#   - ansible_host with the bastion external IP
#   - ansible_user with your OS Login username

all:
  hosts:
    bastion:
      ansible_host: "34.75.211.163"  # Bastion external IP from tofu output
      ansible_user: "needyourcoffe_gmail_com"  # OS Login username
      ansible_ssh_private_key_file: "~/.ssh/google_compute_engine"
  vars:
    ansible_python_interpreter: /usr/bin/python3
    environment_name: dev

name: Build and Deploy

on:
  workflow_call:
    inputs:
      service_name:
        description: "Service name (e.g., product-service)"
        required: true
        type: string
      service_path:
        description: "Path to service directory (e.g., services/product-service)"
        required: true
        type: string
      dockerfile_path:
        description: "Path to Dockerfile (e.g., services/product-service/Dockerfile)"
        required: true
        type: string
      lint_command:
        description: "Service-specific lint command"
        required: true
        type: string
      test_command:
        description: "Service-specific test command"
        required: true
        type: string
      setup_java:
        description: "Set up Java 21 (Temurin)"
        required: false
        type: boolean
        default: false
      setup_python:
        description: "Set up Python 3.12"
        required: false
        type: boolean
        default: false
      setup_node:
        description: "Set up Node 22 + pnpm"
        required: false
        type: boolean
        default: false

env:
  REGISTRY: us-east1-docker.pkg.dev
  PROJECT_ID: project-0042e987-ac93-43ec-a4f
  REPOSITORY: cloudmart-docker

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        if: ${{ inputs.setup_java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python 3.12
        if: ${{ inputs.setup_python }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: ${{ inputs.setup_python }}
        run: pip install uv && uv sync --frozen

      - name: Set up Node 22
        if: ${{ inputs.setup_node }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        if: ${{ inputs.setup_node }}
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.0"

      - name: Install Node dependencies
        if: ${{ inputs.setup_node }}
        run: pnpm install --frozen-lockfile

      - name: Run lint
        run: ${{ inputs.lint_command }}

  test:
    name: Test
    needs: lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ inputs.service_path }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        if: ${{ inputs.setup_java }}
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Set up Python 3.12
        if: ${{ inputs.setup_python }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        if: ${{ inputs.setup_python }}
        run: pip install uv && uv sync --frozen

      - name: Set up Node 22
        if: ${{ inputs.setup_node }}
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set up pnpm
        if: ${{ inputs.setup_node }}
        uses: pnpm/action-setup@v4
        with:
          version: "10.32.0"

      - name: Install Node dependencies
        if: ${{ inputs.setup_node }}
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: ${{ inputs.test_command }}

  build-and-push:
    name: Build and Push
    needs: test
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    outputs:
      image_tag: ${{ github.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: cloudmart-ci@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          token_format: access_token

      - name: Login to Artifact Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: ${{ inputs.service_path }}
          file: ${{ inputs.dockerfile_path }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ inputs.service_name }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ inputs.service_name }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  scan:
    name: Security Scan
    needs: build-and-push
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: projects/${{ secrets.GCP_PROJECT_NUMBER }}/locations/global/workloadIdentityPools/github-actions/providers/github
          service_account: cloudmart-ci@${{ env.PROJECT_ID }}.iam.gserviceaccount.com
          token_format: access_token

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        continue-on-error: true
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ inputs.service_name }}:${{ github.sha }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  deploy-dev:
    name: Deploy to Dev
    needs: [build-and-push]
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    concurrency:
      group: deploy-dev
      cancel-in-progress: false
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Kustomize
        uses: imranismail/setup-kustomize@v2

      - name: Update dev overlay image tag
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd k8s/overlays/dev
          kustomize edit set image "${SERVICE_NAME}=${REGISTRY}/${PROJECT_ID}/${REPOSITORY}/${SERVICE_NAME}:${IMAGE_TAG}"

      - name: Commit and push overlay update
        env:
          SERVICE_NAME: ${{ inputs.service_name }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/dev/kustomization.yaml
          git diff --cached --quiet && echo "No changes" || (git commit -m "chore(dev): update ${SERVICE_NAME} to ${IMAGE_TAG} [skip ci]" && git push)

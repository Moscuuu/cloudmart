name: CI - Product Service

on:
  push:
    branches: [main]
    paths: ["services/product-service/**"]
  pull_request:
    branches: [main]
    paths: ["services/product-service/**"]

concurrency:
  group: ci-product-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: ./.github/workflows/_build-and-deploy.yml
    with:
      service_name: product-service
      service_path: services/product-service
      dockerfile_path: services/product-service/Dockerfile
      lint_command: "mvn compile -B -q"
      test_command: "mvn verify -B"
      setup_java: true
    permissions:
      contents: write
      id-token: write
      pull-requests: write
      security-events: write
    secrets: inherit

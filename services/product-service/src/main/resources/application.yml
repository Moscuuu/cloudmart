spring:
  application:
    name: product-service
  jpa:
    open-in-view: false
  mvc:
    problemdetails:
      enabled: true

jwt:
  secret: ${JWT_SECRET:dev-secret-change-in-production-min-32-bytes}

logging:
  level:
    root: ${LOG_LEVEL:INFO}
    com.cloudmart: ${LOG_LEVEL:INFO}

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  prometheus:
    metrics:
      export:
        enabled: true
  metrics:
    tags:
      application: product-service

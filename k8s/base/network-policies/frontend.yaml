# -----------------------------------------------------------------------------
# Frontend NetworkPolicy
# Ingress: any source on port 80 (GKE Gateway uses infra-level proxies)
# Egress: none beyond DNS (static Nginx -- browser makes API calls, not pod)
# -----------------------------------------------------------------------------
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-frontend
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - {}
      ports:
        - protocol: TCP
          port: 80

apiVersion: v1
kind: Secret
metadata:
  name: db-credentials
  labels:
    app.kubernetes.io/part-of: cloudmart
type: Opaque
stringData:
  # Replace with actual database password before deploying
  password: "REPLACE_WITH_DB_PASSWORD"
  # Order service connection string (contains credentials)
  # Replace REPLACE_WITH_DB_PASSWORD and CLOUD_SQL_PRIVATE_IP with actual values
  database-url: "postgresql+asyncpg://cloudmart:REPLACE_WITH_DB_PASSWORD@CLOUD_SQL_PRIVATE_IP:5432/orderdb"

apiVersion: v1
kind: Secret
metadata:
  name: auth-secrets
  labels:
    app.kubernetes.io/part-of: cloudmart
type: Opaque
stringData:
  # Replace with a random string of at least 32 bytes before deploying
  jwt-secret: "REPLACE_WITH_JWT_SECRET_MIN_32_BYTES"
  # Google OAuth2 client credentials
  oauth-client-id: "REPLACE_WITH_GOOGLE_OAUTH_CLIENT_ID"
  oauth-client-secret: "REPLACE_WITH_GOOGLE_OAUTH_CLIENT_SECRET"

# ArgoCD Helm Installation Values
# ================================
#
# Install:
#   helm repo add argo https://argoproj.github.io/argo-helm
#   helm install argocd argo/argo-cd -n argocd --create-namespace \
#     -f k8s/platform/argocd/install/values.yaml
#
# Get initial admin password:
#   kubectl -n argocd get secret argocd-initial-admin-secret \
#     -o jsonpath="{.data.password}" | base64 -d
#
# Bootstrap app-of-apps:
#   kubectl apply -f k8s/platform/argocd/applications.yaml
#

# -- Global settings
global:
  domain: ""

# -- ArgoCD Server
server:
  service:
    type: LoadBalancer
  extraArgs:
    - "--insecure"
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Repo Server
repoServer:
  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

# -- Application Controller
controller:
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

# -- Server configuration params
configs:
  params:
    server.insecure: true

# -- Disable unused components for portfolio project
dex:
  enabled: false

notifications:
  enabled: false

applicationSet:
  enabled: false

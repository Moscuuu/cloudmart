apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudmart-staging
  namespace: argocd
  labels:
    app.kubernetes.io/part-of: cloudmart
    environment: staging
spec:
  project: default
  source:
    repoURL: https://github.com/Moscuuu/cloudmart.git
    targetRevision: main
    path: k8s/overlays/staging
  destination:
    server: https://kubernetes.default.svc
    namespace: staging
  syncPolicy:
    syncOptions:
      - CreateNamespace=true

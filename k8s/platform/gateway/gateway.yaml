# Shared Gateway for CloudMart
#
# This Gateway provisions a GKE Cloud Load Balancer automatically via
# the gke-l7-global-external-managed GatewayClass (GKE-native controller).
#
# External IP is assigned by GCP and can be retrieved via:
#   kubectl get gateway cloudmart-gateway -n gateway
#
# TLS is terminated at the Gateway using a cert-manager issued certificate.
# For production, replace the self-signed issuer with a Let's Encrypt ClusterIssuer.
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: cloudmart-gateway
  namespace: gateway
  labels:
    app.kubernetes.io/part-of: cloudmart
spec:
  gatewayClassName: gke-l7-global-external-managed
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    # HTTPS listener disabled until a valid GCP-compatible certificate is available.
    # For production, use a Google-managed certificate or pre-shared cert.
    # - name: https
    #   protocol: HTTPS
    #   port: 443
    #   tls:
    #     mode: Terminate
    #     certificateRefs:
    #       - kind: Secret
    #         name: cloudmart-tls
    #         namespace: gateway
    #   allowedRoutes:
    #     namespaces:
    #       from: All

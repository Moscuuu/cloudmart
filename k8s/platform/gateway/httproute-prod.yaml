apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: cloudmart-routes
  namespace: prod
  labels:
    app.kubernetes.io/part-of: cloudmart
    environment: prod
spec:
  parentRefs:
    - name: cloudmart-gateway
      namespace: gateway
  rules:
    # Rule 1 -- Product API (products and inventory)
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/products
        - path:
            type: PathPrefix
            value: /api/v1/inventory
      backendRefs:
        - name: product-service
          port: 8080
    # Rule 2 -- Order API
    - matches:
        - path:
            type: PathPrefix
            value: /api/v1/orders
      backendRefs:
        - name: order-service
          port: 8000
    # Rule 3 -- Frontend catch-all (must be last)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          port: 80

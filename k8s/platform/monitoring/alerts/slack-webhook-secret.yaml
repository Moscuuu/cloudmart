# =============================================================================
# Slack Webhook Secret for Alertmanager
# =============================================================================
#
# INSTRUCTIONS:
#   1. Create an incoming webhook at: https://api.slack.com/messaging/webhooks
#   2. Replace REPLACE_WITH_SLACK_WEBHOOK_URL below with your actual webhook URL
#   3. Apply this secret:
#        kubectl apply -f slack-webhook-secret.yaml
#   4. Alertmanager will automatically pick up the secret and route alerts to Slack
#
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: slack-webhook
  namespace: monitoring
type: Opaque
stringData:
  url: "REPLACE_WITH_SLACK_WEBHOOK_URL"

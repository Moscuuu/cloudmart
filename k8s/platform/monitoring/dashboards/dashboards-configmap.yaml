apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-cluster-overview
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  cluster-overview.json: "{\n  \"uid\": \"cluster-overview\",\n  \"title\": \"CloudMart\
    \ - Cluster Overview\",\n  \"tags\": [\"cloudmart\", \"cluster\"],\n  \"timezone\"\
    : \"browser\",\n  \"schemaVersion\": 39,\n  \"version\": 1,\n  \"refresh\": \"\
    30s\",\n  \"time\": {\n    \"from\": \"now-1h\",\n    \"to\": \"now\"\n  },\n\
    \  \"panels\": [\n    {\n      \"id\": 1,\n      \"title\": \"Node Count\",\n\
    \      \"type\": \"stat\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 0,\
    \ \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"prometheus\"\
    \ },\n      \"targets\": [\n        {\n          \"expr\": \"count(kube_node_info)\"\
    ,\n          \"legendFormat\": \"Nodes\",\n          \"refId\": \"A\"\n      \
    \  }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"\
    thresholds\": {\n            \"steps\": [\n              { \"color\": \"green\"\
    , \"value\": null }\n            ]\n          }\n        },\n        \"overrides\"\
    : []\n      }\n    },\n    {\n      \"id\": 2,\n      \"title\": \"Pod Count by\
    \ Namespace\",\n      \"type\": \"stat\",\n      \"gridPos\": { \"h\": 4, \"w\"\
    : 6, \"x\": 6, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\",\
    \ \"uid\": \"prometheus\" },\n      \"targets\": [\n        {\n          \"expr\"\
    : \"count(kube_pod_info{namespace=~\\\"dev|staging|prod|monitoring\\\"}) by (namespace)\"\
    ,\n          \"legendFormat\": \"{{namespace}}\",\n          \"refId\": \"A\"\n\
    \        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n    \
    \      \"thresholds\": {\n            \"steps\": [\n              { \"color\"\
    : \"blue\", \"value\": null }\n            ]\n          }\n        },\n      \
    \  \"overrides\": []\n      }\n    },\n    {\n      \"id\": 3,\n      \"title\"\
    : \"CPU Utilization\",\n      \"type\": \"timeseries\",\n      \"gridPos\": {\
    \ \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 0 },\n      \"datasource\": { \"type\"\
    : \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n        {\n\
    \          \"expr\": \"sum(rate(node_cpu_seconds_total{mode!=\\\"idle\\\"}[5m]))\
    \ by (instance) / count(node_cpu_seconds_total{mode=\\\"idle\\\"}) by (instance)\
    \ * 100\",\n          \"legendFormat\": \"{{instance}}\",\n          \"refId\"\
    : \"A\"\n        }\n      ],\n      \"fieldConfig\": {\n        \"defaults\":\
    \ {\n          \"unit\": \"percent\",\n          \"min\": 0,\n          \"max\"\
    : 100,\n          \"thresholds\": {\n            \"steps\": [\n              {\
    \ \"color\": \"green\", \"value\": null },\n              { \"color\": \"yellow\"\
    , \"value\": 70 },\n              { \"color\": \"red\", \"value\": 90 }\n    \
    \        ]\n          }\n        },\n        \"overrides\": []\n      }\n    },\n\
    \    {\n      \"id\": 4,\n      \"title\": \"Memory Utilization\",\n      \"type\"\
    : \"timeseries\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\":\
    \ 4 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"prometheus\"\
    \ },\n      \"targets\": [\n        {\n          \"expr\": \"(1 - node_memory_MemAvailable_bytes\
    \ / node_memory_MemTotal_bytes) * 100\",\n          \"legendFormat\": \"{{instance}}\"\
    ,\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\": {\n\
    \        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\"\
    : 0,\n          \"max\": 100,\n          \"thresholds\": {\n            \"steps\"\
    : [\n              { \"color\": \"green\", \"value\": null },\n              {\
    \ \"color\": \"yellow\", \"value\": 70 },\n              { \"color\": \"red\"\
    , \"value\": 90 }\n            ]\n          }\n        },\n        \"overrides\"\
    : []\n      }\n    },\n    {\n      \"id\": 5,\n      \"title\": \"Pod Status\"\
    ,\n      \"type\": \"table\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\"\
    : 12, \"y\": 8 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\":\
    \ \"prometheus\" },\n      \"targets\": [\n        {\n          \"expr\": \"sum(kube_pod_status_phase{namespace=~\\\
    \"dev|staging|prod|monitoring\\\"}) by (namespace, phase)\",\n          \"legendFormat\"\
    : \"{{namespace}} - {{phase}}\",\n          \"refId\": \"A\",\n          \"format\"\
    : \"table\",\n          \"instant\": true\n        }\n      ],\n      \"fieldConfig\"\
    : {\n        \"defaults\": {},\n        \"overrides\": []\n      },\n      \"\
    transformations\": [\n        {\n          \"id\": \"organize\",\n          \"\
    options\": {\n            \"renameByName\": {\n              \"namespace\": \"\
    Namespace\",\n              \"phase\": \"Phase\",\n              \"Value\": \"\
    Count\"\n            }\n          }\n        }\n      ]\n    },\n    {\n     \
    \ \"id\": 6,\n      \"title\": \"Disk Usage\",\n      \"type\": \"gauge\",\n \
    \     \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 12 },\n      \"datasource\"\
    : { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"(1 - node_filesystem_avail_bytes{mountpoint=\\\
    \"/\\\"} / node_filesystem_size_bytes{mountpoint=\\\"/\\\"}) * 100\",\n      \
    \    \"legendFormat\": \"{{instance}}\",\n          \"refId\": \"A\"\n       \
    \ }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"\
    unit\": \"percent\",\n          \"min\": 0,\n          \"max\": 100,\n       \
    \   \"thresholds\": {\n            \"steps\": [\n              { \"color\": \"\
    green\", \"value\": null },\n              { \"color\": \"yellow\", \"value\"\
    : 70 },\n              { \"color\": \"red\", \"value\": 90 }\n            ]\n\
    \          }\n        },\n        \"overrides\": []\n      }\n    }\n  ]\n}\n"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-service-health
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  service-health.json: "{\n  \"uid\": \"service-health\",\n  \"title\": \"CloudMart\
    \ - Service Health\",\n  \"tags\": [\"cloudmart\", \"services\", \"red-metrics\"\
    ],\n  \"timezone\": \"browser\",\n  \"schemaVersion\": 39,\n  \"version\": 1,\n\
    \  \"refresh\": \"30s\",\n  \"time\": {\n    \"from\": \"now-1h\",\n    \"to\"\
    : \"now\"\n  },\n  \"templating\": {\n    \"list\": [\n      {\n        \"name\"\
    : \"service\",\n        \"type\": \"custom\",\n        \"current\": {\n      \
    \    \"text\": \"All\",\n          \"value\": \"$__all\"\n        },\n       \
    \ \"options\": [\n          { \"text\": \"All\", \"value\": \"$__all\", \"selected\"\
    : true },\n          { \"text\": \"product-service\", \"value\": \"product-service\"\
    , \"selected\": false },\n          { \"text\": \"order-service\", \"value\":\
    \ \"order-service\", \"selected\": false }\n        ],\n        \"query\": \"\
    product-service,order-service\",\n        \"includeAll\": true,\n        \"multi\"\
    : true\n      }\n    ]\n  },\n  \"panels\": [\n    {\n      \"id\": 100,\n   \
    \   \"title\": \"RED Metrics\",\n      \"type\": \"row\",\n      \"gridPos\":\
    \ { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 0 },\n      \"collapsed\": false\n \
    \   },\n    {\n      \"id\": 1,\n      \"title\": \"Request Rate\",\n      \"\
    type\": \"timeseries\",\n      \"gridPos\": { \"h\": 8, \"w\": 8, \"x\": 0, \"\
    y\": 1 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\": \"prometheus\"\
    \ },\n      \"targets\": [\n        {\n          \"expr\": \"sum(rate(http_server_requests_seconds_count{service=~\\\
    \"$service\\\"}[5m])) by (service)\",\n          \"legendFormat\": \"{{service}}\"\
    ,\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\": {\n\
    \        \"defaults\": {\n          \"unit\": \"reqps\",\n          \"custom\"\
    : {\n            \"drawStyle\": \"line\",\n            \"fillOpacity\": 10\n \
    \         }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n \
    \     \"id\": 2,\n      \"title\": \"Error Rate %\",\n      \"type\": \"timeseries\"\
    ,\n      \"gridPos\": { \"h\": 8, \"w\": 8, \"x\": 8, \"y\": 1 },\n      \"datasource\"\
    : { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"sum(rate(http_server_requests_seconds_count{status=~\\\
    \"5..\\\",service=~\\\"$service\\\"}[5m])) by (service) / sum(rate(http_server_requests_seconds_count{service=~\\\
    \"$service\\\"}[5m])) by (service) * 100\",\n          \"legendFormat\": \"{{service}}\"\
    ,\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\": {\n\
    \        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\"\
    : 0,\n          \"thresholds\": {\n            \"steps\": [\n              { \"\
    color\": \"green\", \"value\": null },\n              { \"color\": \"yellow\"\
    , \"value\": 1 },\n              { \"color\": \"red\", \"value\": 5 }\n      \
    \      ]\n          },\n          \"custom\": {\n            \"drawStyle\": \"\
    line\",\n            \"fillOpacity\": 10\n          }\n        },\n        \"\
    overrides\": []\n      }\n    },\n    {\n      \"id\": 3,\n      \"title\": \"\
    Duration P50 / P95 / P99\",\n      \"type\": \"timeseries\",\n      \"gridPos\"\
    : { \"h\": 8, \"w\": 8, \"x\": 16, \"y\": 1 },\n      \"datasource\": { \"type\"\
    : \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n        {\n\
    \          \"expr\": \"histogram_quantile(0.50, sum(rate(http_server_requests_seconds_bucket{service=~\\\
    \"$service\\\"}[5m])) by (le, service))\",\n          \"legendFormat\": \"{{service}}\
    \ p50\",\n          \"refId\": \"A\"\n        },\n        {\n          \"expr\"\
    : \"histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket{service=~\\\
    \"$service\\\"}[5m])) by (le, service))\",\n          \"legendFormat\": \"{{service}}\
    \ p95\",\n          \"refId\": \"B\"\n        },\n        {\n          \"expr\"\
    : \"histogram_quantile(0.99, sum(rate(http_server_requests_seconds_bucket{service=~\\\
    \"$service\\\"}[5m])) by (le, service))\",\n          \"legendFormat\": \"{{service}}\
    \ p99\",\n          \"refId\": \"C\"\n        }\n      ],\n      \"fieldConfig\"\
    : {\n        \"defaults\": {\n          \"unit\": \"s\",\n          \"custom\"\
    : {\n            \"drawStyle\": \"line\",\n            \"fillOpacity\": 10\n \
    \         }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n \
    \     \"id\": 101,\n      \"title\": \"Resource Usage\",\n      \"type\": \"row\"\
    ,\n      \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 9 },\n      \"collapsed\"\
    : false\n    },\n    {\n      \"id\": 4,\n      \"title\": \"Pod CPU Usage\",\n\
    \      \"type\": \"timeseries\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"\
    x\": 0, \"y\": 10 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\"\
    : \"prometheus\" },\n      \"targets\": [\n        {\n          \"expr\": \"sum(rate(container_cpu_usage_seconds_total{container=~\\\
    \"product-service|order-service\\\"}[5m])) by (pod)\",\n          \"legendFormat\"\
    : \"{{pod}}\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\"\
    : {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"custom\"\
    : {\n            \"drawStyle\": \"line\",\n            \"fillOpacity\": 10\n \
    \         }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n \
    \     \"id\": 5,\n      \"title\": \"Pod Memory Usage\",\n      \"type\": \"timeseries\"\
    ,\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 12, \"y\": 10 },\n      \"\
    datasource\": { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"\
    targets\": [\n        {\n          \"expr\": \"container_memory_working_set_bytes{container=~\\\
    \"product-service|order-service\\\"} / 1024 / 1024\",\n          \"legendFormat\"\
    : \"{{pod}}\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\"\
    : {\n        \"defaults\": {\n          \"unit\": \"decmbytes\",\n          \"\
    custom\": {\n            \"drawStyle\": \"line\",\n            \"fillOpacity\"\
    : 10\n          }\n        },\n        \"overrides\": []\n      }\n    },\n  \
    \  {\n      \"id\": 102,\n      \"title\": \"Runtime-Specific\",\n      \"type\"\
    : \"row\",\n      \"gridPos\": { \"h\": 1, \"w\": 24, \"x\": 0, \"y\": 18 },\n\
    \      \"collapsed\": false\n    },\n    {\n      \"id\": 6,\n      \"title\"\
    : \"JVM Heap Used (Product Service)\",\n      \"type\": \"timeseries\",\n    \
    \  \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 19 },\n      \"datasource\"\
    : { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"jvm_memory_used_bytes{area=\\\"heap\\\", service=\\\
    \"product-service\\\"} / 1024 / 1024\",\n          \"legendFormat\": \"{{id}}\"\
    ,\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\": {\n\
    \        \"defaults\": {\n          \"unit\": \"decmbytes\",\n          \"custom\"\
    : {\n            \"drawStyle\": \"line\",\n            \"fillOpacity\": 10\n \
    \         }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n \
    \     \"id\": 7,\n      \"title\": \"Python GC Collections (Order Service)\",\n\
    \      \"type\": \"timeseries\",\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"\
    x\": 12, \"y\": 19 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\"\
    : \"prometheus\" },\n      \"targets\": [\n        {\n          \"expr\": \"rate(python_gc_collections_total{service=\\\
    \"order-service\\\"}[5m])\",\n          \"legendFormat\": \"gen{{generation}}\"\
    ,\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\": {\n\
    \        \"defaults\": {\n          \"unit\": \"ops\",\n          \"custom\":\
    \ {\n            \"drawStyle\": \"line\",\n            \"fillOpacity\": 10\n \
    \         }\n        },\n        \"overrides\": []\n      }\n    }\n  ]\n}\n"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-business-metrics
  namespace: monitoring
  labels:
    grafana_dashboard: '1'
data:
  business-metrics.json: "{\n  \"uid\": \"business-metrics\",\n  \"title\": \"CloudMart\
    \ - Business Metrics\",\n  \"tags\": [\"cloudmart\", \"business\"],\n  \"timezone\"\
    : \"browser\",\n  \"schemaVersion\": 39,\n  \"version\": 1,\n  \"refresh\": \"\
    30s\",\n  \"time\": {\n    \"from\": \"now-1h\",\n    \"to\": \"now\"\n  },\n\
    \  \"panels\": [\n    {\n      \"id\": 1,\n      \"title\": \"Orders per Minute\"\
    ,\n      \"type\": \"timeseries\",\n      \"gridPos\": { \"h\": 8, \"w\": 12,\
    \ \"x\": 0, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"\
    uid\": \"prometheus\" },\n      \"targets\": [\n        {\n          \"expr\"\
    : \"sum(rate(orders_created_total[1m])) by (status) * 60\",\n          \"legendFormat\"\
    : \"{{status}}\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\"\
    : {\n        \"defaults\": {\n          \"unit\": \"short\",\n          \"custom\"\
    : {\n            \"drawStyle\": \"line\",\n            \"fillOpacity\": 10\n \
    \         }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n \
    \     \"id\": 2,\n      \"title\": \"Total Orders\",\n      \"type\": \"stat\"\
    ,\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 12, \"y\": 0 },\n      \"datasource\"\
    : { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"sum(orders_created_total)\",\n          \"legendFormat\"\
    : \"Total\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\"\
    : {\n        \"defaults\": {\n          \"thresholds\": {\n            \"steps\"\
    : [\n              { \"color\": \"blue\", \"value\": null }\n            ]\n \
    \         }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n \
    \     \"id\": 3,\n      \"title\": \"Products Viewed\",\n      \"type\": \"timeseries\"\
    ,\n      \"gridPos\": { \"h\": 8, \"w\": 12, \"x\": 0, \"y\": 8 },\n      \"datasource\"\
    : { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n      \"targets\": [\n\
    \        {\n          \"expr\": \"rate(products_viewed_total[5m])\",\n       \
    \   \"legendFormat\": \"Views/sec\",\n          \"refId\": \"A\"\n        }\n\
    \      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n          \"unit\"\
    : \"ops\",\n          \"custom\": {\n            \"drawStyle\": \"line\",\n  \
    \          \"fillOpacity\": 10\n          }\n        },\n        \"overrides\"\
    : []\n      }\n    },\n    {\n      \"id\": 4,\n      \"title\": \"Simulated Revenue\"\
    ,\n      \"type\": \"stat\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\":\
    \ 18, \"y\": 0 },\n      \"datasource\": { \"type\": \"prometheus\", \"uid\":\
    \ \"prometheus\" },\n      \"targets\": [\n        {\n          \"expr\": \"simulated_revenue_dollars\"\
    ,\n          \"legendFormat\": \"Revenue\",\n          \"refId\": \"A\"\n    \
    \    }\n      ],\n      \"fieldConfig\": {\n        \"defaults\": {\n        \
    \  \"unit\": \"currencyUSD\",\n          \"thresholds\": {\n            \"steps\"\
    : [\n              { \"color\": \"green\", \"value\": null }\n            ]\n\
    \          }\n        },\n        \"overrides\": []\n      }\n    },\n    {\n\
    \      \"id\": 5,\n      \"title\": \"Order Success Rate\",\n      \"type\": \"\
    gauge\",\n      \"gridPos\": { \"h\": 4, \"w\": 6, \"x\": 12, \"y\": 4 },\n  \
    \    \"datasource\": { \"type\": \"prometheus\", \"uid\": \"prometheus\" },\n\
    \      \"targets\": [\n        {\n          \"expr\": \"sum(orders_created_total{status=\\\
    \"completed\\\"}) / sum(orders_created_total) * 100\",\n          \"legendFormat\"\
    : \"Success %\",\n          \"refId\": \"A\"\n        }\n      ],\n      \"fieldConfig\"\
    : {\n        \"defaults\": {\n          \"unit\": \"percent\",\n          \"min\"\
    : 0,\n          \"max\": 100,\n          \"thresholds\": {\n            \"steps\"\
    : [\n              { \"color\": \"red\", \"value\": null },\n              { \"\
    color\": \"yellow\", \"value\": 80 },\n              { \"color\": \"green\", \"\
    value\": 95 }\n            ]\n          }\n        },\n        \"overrides\":\
    \ []\n      }\n    }\n  ]\n}\n"

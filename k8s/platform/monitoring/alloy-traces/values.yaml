# Alloy Traces Helm Values (Deployment Mode)
# =============================================
#
# Deploys Alloy as Deployment for OTLP trace reception.
# Services send traces to alloy-traces.monitoring:4317 (gRPC)
# or alloy-traces.monitoring:4318 (HTTP).
#
# Install:
#   helm repo add grafana https://grafana.github.io/helm-charts
#   helm upgrade --install alloy-traces grafana/alloy \
#     -n monitoring -f values.yaml --wait
#

fullnameOverride: "alloy-traces"

alloy:
  configMap:
    create: true
    content: |
      otelcol.receiver.otlp "default" {
        grpc {
          endpoint = "0.0.0.0:4317"
        }
        http {
          endpoint = "0.0.0.0:4318"
        }
        output {
          traces = [otelcol.processor.batch.default.input]
        }
      }

      otelcol.processor.batch "default" {
        output {
          traces = [otelcol.exporter.otlp.tempo.input]
        }
      }

      otelcol.exporter.otlp "tempo" {
        client {
          endpoint = "tempo.monitoring:4317"
          tls {
            insecure = true
          }
        }
      }
  extraPorts:
    - name: otlp-grpc
      port: 4317
      targetPort: 4317
      protocol: TCP
    - name: otlp-http
      port: 4318
      targetPort: 4318
      protocol: TCP

controller:
  type: deployment
  replicas: 1

resources:
  requests:
    cpu: 64m
    memory: 128Mi
  limits:
    cpu: 200m
    memory: 256Mi

serviceAccount:
  create: true

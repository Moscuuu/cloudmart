apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: staging

resources:
  - ../../base/product-service
  - ../../base/order-service
  - ../../base/frontend
  - ../../base/redis
  - ../../base/network-policies
  - ../../base/rbac
  - nginx-config.yaml
  # Secrets are NOT included here -- they contain sensitive values and must be
  # created via create-secrets.sh (reads from terraform outputs) BEFORE applying
  # this overlay. See create-secrets.sh for usage.

images:
  - name: product-service
    newName: us-east1-docker.pkg.dev/project-0042e987-ac93-43ec-a4f/cloudmart-docker/product-service
    newTag: latest
  - name: order-service
    newName: us-east1-docker.pkg.dev/project-0042e987-ac93-43ec-a4f/cloudmart-docker/order-service
    newTag: latest
  - name: frontend
    newName: us-east1-docker.pkg.dev/project-0042e987-ac93-43ec-a4f/cloudmart-docker/frontend
    newTag: latest

patches:
  # Deployment resource overrides (replicas, resource limits)
  - path: patches/product-service.yaml
  - path: patches/order-service.yaml
  - path: patches/frontend.yaml
  - path: patches/redis.yaml
  # ConfigMap overrides (environment-specific values)
  - path: patches/product-service-config.yaml
  - path: patches/order-service-config.yaml
  # ServiceAccount overrides (Workload Identity GSA annotations)
  - path: patches/product-service-sa.yaml
  - path: patches/order-service-sa.yaml
